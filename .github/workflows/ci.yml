name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install workspace dependencies
        run: npm install
      - name: Validate API and event contracts
        run: npm run contracts:validate
      - name: event-contracts unit tests
        working-directory: packages/event-contracts
        run: npm test

  py-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test py-common
        run: |
          pip install -e "packages/py-common[dev]"
          pytest -q packages/py-common

  ts-common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install, build, and test ts-common
        run: |
          npm install
          npm run build -w @healuxa/ts-common
          npm test -w @healuxa/ts-common

  identity-service:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healuxa
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: healuxa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create identity_test database
        env:
          PGPASSWORD: dev
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
          psql -h localhost -U healuxa -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE identity_test;"
      - name: Install packages and identity-service
        run: |
          pip install -e packages/py-common
          pip install -e "services/identity-service[dev]"
      - name: Migrate and test
        env:
          DATABASE_URL: postgresql+asyncpg://healuxa:dev@localhost:5432/identity_test
          REDIS_URL: redis://localhost:6379/0
          NATS_URL: nats://localhost:4222
          PASSWORD_PEPPER: ci-pepper
          MFA_ENCRYPTION_KEY: ci-mfa-key-32bytes-long!!!!!!
          SERVICE_AUTH_CLIENT_ID: healuxa-internal
          SERVICE_AUTH_CLIENT_SECRET: ci-service-secret
        working-directory: services/identity-service
        run: |
          alembic upgrade head
          pytest -q
          python -c "from identity_service.main import app; print('app ok', app.title)"

  transformation-engine:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healuxa
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: healuxa
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create transformation_test database
        env:
          PGPASSWORD: dev
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
          psql -h localhost -U healuxa -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE transformation_test;"
      - name: Install packages and transformation-engine
        run: |
          pip install -e packages/py-common
          pip install -e "services/transformation-engine[dev]"
      - name: Migrate and test
        env:
          DATABASE_URL: postgresql+asyncpg://healuxa:dev@localhost:5432/transformation_test
          TENANT_DEFAULT: healuxa-dubai
          SERVICE_AUTH_CLIENT_ID: healuxa-internal
          SERVICE_AUTH_CLIENT_SECRET: ci-service-secret
        working-directory: services/transformation-engine
        run: |
          alembic upgrade head
          pytest -q
          python -c "from transformation_engine.main import app; print('app ok', app.title)"

  profile-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages and profile-service
        run: |
          pip install -e packages/py-common
          pip install -e "services/profile-service[dev]"
      - name: Test profile-service (Mongo tests skip without Atlas secret)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          MONGODB_DATABASE: healuxa_profile_test
          TENANT_DEFAULT: healuxa-dubai
          SERVICE_AUTH_CLIENT_ID: healuxa-internal
          SERVICE_AUTH_CLIENT_SECRET: ci-service-secret
        working-directory: services/profile-service
        run: |
          if [ -z "${MONGODB_URI:-}" ]; then
            echo "MONGODB_URI_TEST secret not set — skipping profile-service Mongo tests"
          fi
          pytest -q -rs
          python -c "from profile_service.main import app; print('app ok', app.title)"
