# Healuxa local development stack — Healuxa_TechSpec.md §24.5
name: healuxa-dev

networks:
  healuxa-net: {}

volumes:
  pg_data: {}

services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - healuxa-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healuxa
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: healuxa
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    networks:
      - healuxa-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - healuxa-net

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
    networks:
      - healuxa-net

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - healuxa-net

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    environment:
      APP_ENV: development
      SERVICE_NAME: identity-service
      DATABASE_URL: postgresql+asyncpg://healuxa:dev@postgres:5432/identity
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      NATS_ENABLED: "true"
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "2592000"
      PASSWORD_PEPPER: dev-pepper-change-me
      MFA_ENCRYPTION_KEY: dev-mfa-key-32bytes-long!!!!!!
      MFA_ISSUER: Healuxa
      OTP_TTL: "300"
      LOGIN_MAX_ATTEMPTS: "5"
      LOCKOUT_SECONDS: "900"
      SERVICE_AUTH_CLIENT_ID: healuxa-internal
      SERVICE_AUTH_CLIENT_SECRET: dev-service-secret-change-me
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
      - nats
    networks:
      - healuxa-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.identity.rule=Host(`api.localhost`) && PathPrefix(`/v1/auth`)
      - traefik.http.services.identity.loadbalancer.server.port=8001
